<div class="experience">
  <div class="section-header">
    <h2>My <span>Experience</span></h2>
    <div class="underline"></div>
  </div>

  <div *ngIf="isLoading" class="loading">Loading...</div>
  <div *ngIf="errorMessage" class="error">{{ errorMessage }}</div>

  <div class="timeline" *ngIf="!isLoading && !errorMessage">
    <div class="timeline-item" *ngFor="let exp of experiences">
      <div class="timeline-dot"></div>

      <div class="timeline-card">
        <div class="timeline-header">
          <div>
            <h3>{{ exp.title }}</h3>
            <p class="organization">{{ exp.organization }} — {{ exp.location }}</p>
          </div>
          <span class="date-badge">{{ exp.startDate }} - {{ exp.endDate }}</span>
        </div>

        <p class="timeline-description">{{ exp.description }}</p>

        <div class="tags">
          <span class="tag" *ngFor="let tag of getTagsArray(exp.tags)">{{ tag }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
