<div class="experience">
  <div class="section-header">
    <h2>My <span>Experience</span></h2>
    <div class="underline"></div>
  </div>

  <div class="timeline">
    <div
      class="timeline-item"
      *ngFor="let exp of experiences" >
      <div class="timeline-dot"></div>

      <div class="timeline-card">
        <div class="timeline-header">
          <div>
            <h3>{{ exp.title }}</h3>
            <p class="organization">{{ exp.organization }} — {{ exp.location }}</p>
          </div>
          <span class="date-badge">{{ exp.startDate }} - {{ exp.endDate }}</span>
        </div>

        <p class="timeline-description">{{ exp.description }}</p>

        <div class="tags">
          <span class="tag" *ngFor="let tag of exp.tags">{{ tag }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
