<div class="about">
  <div class="section-header">
    <h2>About <span>Me</span></h2>
    <div class="underline"></div>
  </div>

  <div class="about-content">
    <div class="about-text">
      <p>{{ about.bio1 }}</p>
      <p>{{ about.bio2 }}</p>

      <div class="about-details">
        <div class="detail-item">
          <span class="detail-label">Name</span>
          <span class="detail-value">{{ about.name }}</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">Degree</span>
          <span class="detail-value">{{ about.degree }}</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">Focus</span>
          <span class="detail-value">{{ about.focus }}</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">Status</span>
          <span class="detail-value available">{{ about.status }}</span>
        </div>
      </div>

      <a href="#contact" class="btn-primary">Get In Touch</a>
    </div>

    <div class="about-stats">
      <div class="stat-card" *ngFor="let stat of stats">
        <span class="stat-number">{{ stat.number }}</span>
        <span class="stat-label">{{ stat.label }}</span>
      </div>
    </div>
  </div>
</div>
